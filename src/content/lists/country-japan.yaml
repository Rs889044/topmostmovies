dimension: country
value: japan
title: "Top 10 Movies from Japan"
intro: >-
  Japanese cinema spans hand-drawn fantasy worlds, intimate dramas, and some of the most
  imaginative storytelling in film. This list highlights the essentials — including two
  animated masterpieces that became global sensations and proved animation can move audiences
  of every age. Age ratings are included so families can choose with confidence.
faq:
  - q: What is the best Japanese animated movie?
    a: >-
      Spirited Away is the most acclaimed — it won the Best Animated Feature Oscar and is
      often called one of the greatest animated films ever. Your Name is the modern
      blockbuster favorite, blending romance and fantasy.
  - q: Is Spirited Away appropriate for kids?
    a: >-
      It's rated PG for a few scary moments and eerie images. Most children enjoy it, though
      very young or sensitive kids may find parts intense. It's a wonderful family watch
      overall.
