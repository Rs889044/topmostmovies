dimension: decade
value: 2010s
title: "Top 10 Movies of the 2010s"
intro: >-
  The 2010s gave us some of the most talked-about films of the century — a decade when a
  Korean class satire won Best Picture, horror got smart and political, and a desert chase
  redefined the action movie. This list rounds up the standouts that defined the era across
  genres and continents, each with its age rating noted.
faq:
  - q: What are the best movies of the 2010s?
    a: >-
      Parasite, Get Out, and Mad Max: Fury Road are among the decade's most acclaimed and
      influential films, spanning satire, horror, and action. Each pushed its genre forward
      in a different way.
  - q: What was the biggest movie of the 2010s?
    a: >-
      In cultural impact, Parasite stands out for making Oscar history, while Mad Max: Fury
      Road is often cited as the decade's best pure action film.
