dimension: genre
value: animation
title: "Top 10 Animated Movies"
intro: >-
  Animation isn't just for kids — it's a medium capable of breathtaking beauty and deep
  feeling. This list celebrates the best animated films, led by two Japanese masterpieces
  that dazzled the world with hand-drawn imagination and genuine emotion. We note each film's
  age rating so you can find the right pick for family movie night or a solo watch.
faq:
  - q: What is the best animated movie of all time?
    a: >-
      Spirited Away tops many critics' lists — Hayao Miyazaki's Oscar-winning fantasy is
      endlessly inventive and emotionally rich. Your Name is the standout among more recent
      animated films.
  - q: Are these animated movies suitable for children?
    a: >-
      Most are family-friendly, but check each film's age rating. Spirited Away (PG) has a
      few scary moments, while Your Name (PG) is emotionally intense in places but fine for
      older children and up.
