# Editorial override for the K-Drama genre list. Pins + blurbs reference films that exist
# in the catalog (see docs/CONTENT-GUIDELINES.md). The k-drama tag collects emotionally
# resonant Korean dramas — the cinematic cousins of the K-drama TV style.
dimension: genre
value: k-drama
title: "Top 10 K-Drama Movies"
intro: >-
  If the emotional gut-punches and tender storytelling of Korean dramas are your thing,
  these films deliver that same feeling in a single sitting. We've gathered the most
  heartfelt Korean dramas worth starting with — moving, beautifully shot, and easy to fall
  into even if you've never watched a full TV series.
rankOverride:
  - miracle-in-cell-no-7-2013
  - hope-2013
  - be-with-you-2018
perMovieBlurb:
  miracle-in-cell-no-7-2013: >-
    A tear-jerking crowd-pleaser about a wrongly imprisoned father and his little daughter —
    one of Korea's most beloved emotional dramas.
  hope-2013: >-
    A delicate, deeply moving story of a family healing after tragedy; not an easy watch,
    but an unforgettable one.
  be-with-you-2018: >-
    A gentle fantasy romance about love, memory and second chances — pure K-drama warmth.
faq:
  - q: What is the best K-drama movie to start with?
    a: >-
      Miracle in Cell No. 7 is the easiest entry point — funny, devastating, and hugely
      popular. For something gentler, Be With You is a lovely fantasy romance, while Hope is
      a more serious, powerful drama.
  - q: Are K-drama movies the same as Korean dramas?
    a: >-
      Not exactly. "K-drama" usually means episodic Korean TV series, but these films carry
      the same emotional, character-driven style in a single two-hour story — perfect if you
      want the feeling without committing to 16 episodes.
