dimension: genre
value: romance
title: "Top 10 Romance Movies"
intro: >-
  Whether you want a good cry, a swoony date-night pick, or a love story that lingers, this
  list has you covered. We've pulled together romance from across the world — a generation-
  spanning Hollywood weepie, Korea's most charming rom-com, Bollywood's most beloved love
  story, and a whimsical slice of Parisian magic. Each entry notes its age rating so you can
  match the mood to the moment.
faq:
  - q: What are the best Korean romance movies?
    a: >-
      My Sassy Girl is the classic starting point — equal parts comedy and heartbreak — and
      The Classic is a beautiful, nostalgic tearjerker. Both define the swoony, bittersweet
      style Korean romance is loved for.
  - q: What's a good romance movie for date night?
    a: >-
      The Notebook is the go-to crowd-pleaser, while Amélie offers something lighter and more
      whimsical. For a sweeping, music-filled option, Dilwale Dulhania Le Jayenge is hard to
      beat.
