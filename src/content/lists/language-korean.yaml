dimension: language
value: korean
title: "Top 10 Korean-Language Movies"
intro: >-
  Korean cinema has gone from cult obsession to global powerhouse, and these Korean-language
  films are the best place to see why. From Bong Joon-ho's Oscar-sweeping Parasite to Park
  Chan-wook's stylish thrillers and a zombie ride that won over the whole world, this list
  spans horror, romance, crime, and everything between. We've noted each film's age rating
  too, so you know what you're settling in for.
faq:
  - q: What is the best Korean movie of all time?
    a: >-
      Parasite (2019) is the consensus pick — it became the first non-English-language film
      to win the Best Picture Oscar and works as comedy, thriller, and class satire all at
      once. Oldboy and Train to Busan are the usual runners-up.
  - q: Which Korean movie won an Oscar?
    a: >-
      Parasite, directed by Bong Joon-ho, won four Academy Awards including Best Picture and
      Best Director at the 2020 ceremony — a historic first for a Korean film.
  - q: What's a good Korean thriller to start with?
    a: >-
      Oldboy is the most famous entry point, but Parasite and The Handmaiden are both more
      accessible while still delivering the tension Korean thrillers are known for.
